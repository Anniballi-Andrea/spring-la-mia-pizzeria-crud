<!DOCTYPE html>
<html lxmls:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
    <title>Aggiungi pizza</title>
</head>


<body>
    <header>
        <th:block th:replace="~{fragments/nav :: nav}"></th:block>
    </header>
    <main>

        <div class="container">
            <h1 class="mb-3">Aggiungi una pizza:</h1>
            <form id="add-pizza-form" th:action="@{/pizzeria/create}" th:object="${pizza}" method="post">
                <div class="mb-3" th:if="${#fields.hasErrors()}">
                    <p class="text-danger">completa i campi con un errore</p>
                </div>
                <div class="row mt-3">
                    <div class="col-4">
                        <div class="mt-3">
                            <label class="form-label" for="name">Nome della pizza:</label>
                            <input class="form-control" type="text" id="name" placeholder="es: margherita"
                                th:field="*{name}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('name')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="mt-3">
                            <label class="form-label" for="price">Prezzo:</label>
                            <input class="form-control" type="number" min="0" step="0.01" id="price" placeholder="es: 5"
                                th:field="*{price}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('price')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="mt-3">
                            <label class="form-label" for="imageFile">Immagine:</label>
                            <input class="form-control" type="text" id="image" th:field="*{image}"
                                th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('image')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('image')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="mt-5">
                            <label class="form-label" for="description">Descrizione:</label>
                            <textarea class="form-control" type="file" id="description" placeholder="descrizione..."
                                th:field="*{description}" th:errorClass="is-invalid"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('description')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>

                    </div>
                    <div class="col-12 d-flex justify-content-between mt-5">

                        <input class="btn btn-primary" type="submit" value="Aggiungi">
                        <input class="btn btn-warning" type="reset" value="Resetta campi">
                    </div>

                </div>


            </form>
        </div>
    </main>


</body>

</html>
